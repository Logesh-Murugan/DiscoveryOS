services:
  # Python FastAPI Backend Pipeline Service
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discoveryos-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
    extra_hosts:
      # Allows container to reach host machine's Ollama instance at host.docker.internal:11434
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Vite React Frontend Web Application Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: discoveryos-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
